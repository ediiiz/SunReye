---
name: Docker · addon

# Home Assistant addon images, one per arch (the Supervisor pulls
# ghcr.io/…-addon-{arch} per sunreye/config.yaml). Built when release-please
# cuts an addon release, nightly from master, or manually (optionally promoting
# the ref to the moving `beta` tag).
on:
  push:
    tags: ["addon-v*"]
  schedule:
    - cron: "34 3 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Extra moving tag to apply"
        type: choice
        options: ["none", "beta"]
        default: "none"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-addon-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  guard:
    name: Skip stale nightly
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - uses: actions/checkout@v4
      - name: Build unless a scheduled run finds master unchanged for 24h
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] || [ "$(git log -1 --format=%ct)" -ge "$(( $(date +%s) - 86400 ))" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "no commits since last nightly — skipping"
          fi

  build:
    name: Build & push (${{ matrix.arch }})
    needs: guard
    if: needs.guard.outputs.build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      # The Supervisor installs whatever version config.yaml declares and pulls
      # exactly that image tag — a drift between the two bricks installs.
      - name: Assert config.yaml version matches the release tag
        if: startsWith(github.ref, 'refs/tags/addon-v')
        run: |
          tag_version="${GITHUB_REF_NAME#addon-v}"
          config_version="$(yq -r '.version' sunreye/config.yaml)"
          if [ "$tag_version" != "$config_version" ]; then
            echo "::error::sunreye/config.yaml version ($config_version) != tag version ($tag_version)"
            exit 1
          fi

      - name: Resolve per-arch base image
        id: base
        run: echo "build_from=$(yq -r '.build_from.${{ matrix.arch }}' sunreye/build.yaml)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-addon-${{ matrix.arch }}
          tags: |
            type=match,pattern=addon-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=addon-v(\d+\.\d+)\.,group=1
            type=sha,format=short
            type=schedule,pattern=nightly
            type=raw,value=beta,enable=${{ inputs.channel == 'beta' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/addon-v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sunreye/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ steps.base.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=addon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=addon-${{ matrix.arch }}
          provenance: false
