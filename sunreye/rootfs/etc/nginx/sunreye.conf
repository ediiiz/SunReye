# SunReye front door. Two listeners serving the same proxied app:
#   8099 — Home Assistant ingress (Supervisor-only, see the allow/deny block)
#   8100 — optional direct LAN access (only reachable when the user maps the
#          port in the addon's network configuration; UI *and* API, so
#          third-party /api/v1 integrations use http://<host>:8100/api/v1)
pid /run/nginx.pid;
worker_processes 1;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    error_log /proc/self/fd/2 warn;
    sendfile on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream sunreye_server {
        server 127.0.0.1:3000;
        keepalive 8;
    }

    upstream sunreye_web {
        server 127.0.0.1:3001;
        keepalive 8;
    }

    server {
        listen 8099 default_server;
        # Ingress requests only ever originate from the Supervisor; loopback is
        # allowed for the container's own healthcheck. This restriction is also
        # what makes the X-SunReye-Proxied origin trust in the auth layer sound.
        allow 172.30.32.2;
        allow 127.0.0.1;
        deny all;
        include /etc/nginx/sunreye-locations.conf;
    }

    server {
        listen 8100 default_server;
        include /etc/nginx/sunreye-locations.conf;
    }
}
