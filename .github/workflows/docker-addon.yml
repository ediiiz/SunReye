---
name: Docker · addon

# Home Assistant addon images, one per arch (the Supervisor pulls
# ghcr.io/…-addon-{arch} per sunreye/config.yaml). Built when release-please
# cuts an addon release, nightly from master, or manually (optionally promoting
# the ref to the moving `beta` tag).
on:
  push:
    tags: ["addon-v*"]
  schedule:
    - cron: "34 3 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Extra moving tag to apply"
        type: choice
        options: ["none", "beta"]
        default: "none"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-addon-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  guard:
    name: Skip stale nightly
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - uses: actions/checkout@v4
      - name: Build unless a scheduled run finds master unchanged for 24h
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] || [ "$(git log -1 --format=%ct)" -ge "$(( $(date +%s) - 86400 ))" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "no commits since last nightly — skipping"
          fi

  build:
    name: Build & push (${{ matrix.arch }})
    needs: guard
    if: needs.guard.outputs.build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      # The image tag and BUILD_VERSION come from the git tag (below), so the
      # published image is correct regardless of config.yaml. config.yaml is
      # deliberately NOT bumped yet — the `publish` job advances it on master
      # only after every arch here has pushed, so the Supervisor never offers a
      # version whose image is still building (or failed).
      - name: Resolve per-arch base image
        id: base
        run: echo "build_from=$(yq -r '.build_from.${{ matrix.arch }}' sunreye/build.yaml)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-addon-${{ matrix.arch }}
          tags: |
            type=match,pattern=addon-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=addon-v(\d+\.\d+)\.,group=1
            type=sha,format=short
            type=schedule,pattern=nightly
            type=raw,value=beta,enable=${{ inputs.channel == 'beta' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/addon-v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sunreye/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ steps.base.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=addon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=addon-${{ matrix.arch }}
          provenance: false

  # Every arch image is pushed and reachable at this point. Only now advance
  # the version the Supervisor reads (config.yaml) and give the release a real
  # changelog — the union of the server (incl. migrate/db) and web changes,
  # since the addon ships them as one image. release-please leaves the addon
  # with a "Synchronize sunreye-stack versions" placeholder; this replaces it.
  #
  # Committed to master as a `chore` so it never itself triggers a release, and
  # only on a real release tag (not nightly/manual builds).
  publish:
    name: Publish version + changelog
    needs: build
    if: startsWith(github.ref, 'refs/tags/addon-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Resolve released version
        id: v
        run: echo "version=${GITHUB_REF_NAME#addon-v}" >> "$GITHUB_OUTPUT"

      - name: Aggregate addon changelog from server + web
        run: |
          node scripts/addon-changelog.mjs "${{ steps.v.outputs.version }}" > "$RUNNER_TEMP/addon-notes.md"

      - name: Advance config.yaml to the published version
        run: |
          sed -i -E "s/^version: .*/version: ${{ steps.v.outputs.version }}/" sunreye/config.yaml

      - name: Commit to master
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- sunreye/config.yaml sunreye/CHANGELOG.md; then
            echo "config.yaml and CHANGELOG.md already current — nothing to publish"
            exit 0
          fi
          git add sunreye/config.yaml sunreye/CHANGELOG.md
          git commit -m "chore(addon): publish ${{ steps.v.outputs.version }} [skip ci]"
          git push origin HEAD:master

      - name: Sync GitHub release notes
        run: gh release edit "${GITHUB_REF_NAME}" --notes-file "$RUNNER_TEMP/addon-notes.md"
