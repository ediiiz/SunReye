name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      sdk_released: ${{ steps.release.outputs['packages/profile-sdk--release_created'] }}
      server_released: ${{ steps.release.outputs.release_created }}
      server_tag: ${{ steps.release.outputs.tag_name }}
      web_released: ${{ steps.release.outputs['apps/web--release_created'] }}
      web_tag: ${{ steps.release.outputs['apps/web--tag_name'] }}
      addon_released: ${{ steps.release.outputs['sunreye--release_created'] }}
      addon_tag: ${{ steps.release.outputs['sunreye--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4

  # Tags created with GITHUB_TOKEN never trigger `on: push: tags` workflows
  # (GitHub suppresses runs for events made by that token), so the Docker
  # builds are dispatched explicitly at the release tag's ref.
  build-images:
    name: Dispatch Docker builds
    needs: release-please
    if: needs.release-please.outputs.server_released == 'true' || needs.release-please.outputs.web_released == 'true' || needs.release-please.outputs.addon_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Server + migrate images
        if: needs.release-please.outputs.server_released == 'true'
        run: |
          gh workflow run docker-server.yml --repo "$GITHUB_REPOSITORY" --ref "${{ needs.release-please.outputs.server_tag }}"
          gh workflow run docker-migrate.yml --repo "$GITHUB_REPOSITORY" --ref "${{ needs.release-please.outputs.server_tag }}"
      - name: Web image
        if: needs.release-please.outputs.web_released == 'true'
        run: gh workflow run docker-web.yml --repo "$GITHUB_REPOSITORY" --ref "${{ needs.release-please.outputs.web_tag }}"
      - name: Addon images
        if: needs.release-please.outputs.addon_released == 'true'
        run: gh workflow run docker-addon.yml --repo "$GITHUB_REPOSITORY" --ref "${{ needs.release-please.outputs.addon_tag }}"

  publish-sdk:
    name: Publish profile-sdk to npm
    needs: release-please
    if: needs.release-please.outputs.sdk_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC token for npm trusted publishing — no NPM_TOKEN secret involved.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test src
        working-directory: packages/profile-sdk

      # Trusted publishing needs the npm CLI (>= 11.5.1) for the OIDC
      # exchange; bun publish can't do it.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Build and pack
        # bun pm pack rewrites workspace:/catalog: versions to real semver,
        # which the npm CLI can't do for a bun workspace.
        run: bun run build && bun pm pack
        working-directory: packages/profile-sdk

      - name: Publish via OIDC
        # Publish the extracted bun-packed tarball; --ignore-scripts because
        # prepublishOnly (the build) already ran above.
        run: |
          tar -xzf sunreye-profile-sdk-*.tgz
          npm publish ./package --ignore-scripts --access public --provenance
        working-directory: packages/profile-sdk
