# Shared routing for both listeners: engine surface to the server, everything
# else to the SvelteKit app. X-SunReye-Proxied is *set* (never forwarded) on
# every engine location — it tells the auth layer the request came through our
# own front door, so the browser's Origin can be trusted for the CSRF check.

location /api/ {
    proxy_pass http://sunreye_server;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-SunReye-Proxied "1";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 90s;
}

location /openapi {
    proxy_pass http://sunreye_server;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-SunReye-Proxied "1";
}

location /ws/ {
    proxy_pass http://sunreye_server;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-SunReye-Proxied "1";
    # The metrics stream ticks at 1 Hz; anything quiet for this long is dead.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

location = /healthz {
    proxy_pass http://sunreye_server;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
}

location / {
    proxy_pass http://sunreye_web;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # The app ships as one large client bundle; don't spool it to a temp file
    # on every load ("an upstream response is buffered to a temporary file").
    proxy_buffering off;
}
