name: Docs · GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "apps/docs/**"
      - "bun.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# The site lives at the org root (https://sunreye.github.io/), which GitHub
# only serves from the SunReye/SunReye.github.io repo — so the built site is
# pushed there over a deploy key instead of this repo's Pages OIDC flow.
permissions:
  contents: read

# One in-flight Pages deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run --filter docs build

      - name: Publish to SunReye/SunReye.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Private half of the write deploy key configured on the
          # SunReye.github.io repo (Settings → Deploy keys).
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: SunReye/SunReye.github.io
          publish_branch: main
          publish_dir: apps/docs/dist
