---
name: Upgrade test

# Proves the upgrade path end-to-end before it reaches a user: boot the last
# published release, let it collect data, swap in freshly built images, and
# assert the migration runner (baseline stamping included — the old release is
# still push-shaped or journaled at an older point) preserves the data and the
# server comes back healthy.
on:
  pull_request:
    paths:
      - "packages/db/**"
      - "docker/**"
      - "apps/server/**"
      - "sunreye/**"
      - ".github/workflows/upgrade-test.yml"
  push:
    tags: ["server-v*", "addon-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: upgrade-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-upgrade:
    name: Compose upgrade (latest → this build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker
    env:
      POSTGRES_PASSWORD: upgrade-test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write server env
        run: |
          cat > .env <<'EOF'
          BETTER_AUTH_SECRET=upgrade-test-secret-0123456789abcdef
          INVERTER_SIMULATE=true
          EOF

      - name: Start the last published release
        run: |
          # The checked-out compose file carries healthchecks (`/app/server
          # --healthcheck`, /healthz) that images from before that release
          # don't implement — relax them for the old stack only. The upgraded
          # stack in later steps runs the real healthchecks.
          cat > compose.compat.yml <<'EOF'
          services:
            server:
              healthcheck:
                test: ["NONE"]
            web:
              depends_on:
                server:
                  condition: service_started
          EOF
          SUNREYE_TAG=latest docker compose -f docker-compose.yml -f compose.compat.yml up -d --quiet-pull
          for i in $(seq 1 60); do
            curl -fsS http://localhost:3000/ >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://localhost:3000/ >/dev/null

      - name: Wait for simulated metrics
        run: |
          for i in $(seq 1 60); do
            n=$(docker compose exec -T postgres psql -U postgres -d SunReye -tAc "SELECT count(*) FROM metrics_raw" || echo 0)
            [ "${n:-0}" -gt 0 ] && break
            sleep 2
          done
          docker compose exec -T postgres psql -U postgres -d SunReye -tAc "SELECT count(*) FROM metrics_raw" | tee /tmp/rows-before
          [ "$(cat /tmp/rows-before)" -gt 0 ]

      - name: Build this ref's images
        working-directory: .
        run: |
          docker build -f docker/migrate.Dockerfile -t sunreye-migrate:pr .
          docker build -f apps/server/Dockerfile -t sunreye-server:pr .

      - name: Upgrade in place
        run: |
          docker compose stop server migrate
          SUNREYE_TAG=latest docker compose up -d --no-recreate postgres
          # Re-point server + migrate at the PR images without touching the volume.
          docker compose rm -f server migrate
          cat > docker-compose.override.yml <<'EOF'
          services:
            migrate:
              image: sunreye-migrate:pr
            server:
              image: sunreye-server:pr
          EOF
          SUNREYE_TAG=latest docker compose up -d server

      - name: Assert migration outcome
        run: |
          docker compose logs migrate
          [ "$(docker inspect -f '{{.State.ExitCode}}' "$(docker compose ps -aq migrate)")" = "0" ]

          # Baseline / journal: exactly the shipped migrations are recorded.
          shipped=$(ls ../packages/db/src/migrations/*.sql | wc -l)
          recorded=$(docker compose exec -T postgres psql -U postgres -d SunReye -tAc "SELECT count(*) FROM drizzle.__drizzle_migrations")
          echo "shipped=$shipped recorded=$recorded"
          [ "$recorded" = "$shipped" ]

          # Data survived.
          after=$(docker compose exec -T postgres psql -U postgres -d SunReye -tAc "SELECT count(*) FROM metrics_raw")
          echo "rows before=$(cat /tmp/rows-before) after=$after"
          [ "$after" -ge "$(cat /tmp/rows-before)" ]

      - name: Assert server healthy after upgrade
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:3000/healthz >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://localhost:3000/healthz

      - name: Assert rollups intact
        run: |
          docker compose exec -T postgres psql -U postgres -d SunReye -c "CALL refresh_continuous_aggregate('minute_rollups', NULL, NULL);"
          rollups=$(docker compose exec -T postgres psql -U postgres -d SunReye -tAc "SELECT count(*) FROM minute_rollups")
          echo "rollup rows=$rollups"
          [ "$rollups" -gt 0 ]

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
