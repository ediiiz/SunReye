name: SunReye

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        PUBLIC_SERVER_URL: http://localhost:3000
    init: true
    ports:
      - "3001:3001"
    env_file:
      - path: apps/web/.env
        required: false
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped

  # One-shot schema init: applies the drizzle schema (db:push) + TimescaleDB DDL
  # (db:timescale) against the Postgres service, then exits. Idempotent. The
  # server waits for it to complete before starting.
  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    environment:
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/SunReye
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    init: true
    ports:
      - "3000:3000"
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/SunReye
    # The server image is distroless (no shell/node/curl), so there is no
    # in-container binary to run an exec healthcheck with. Dependents use
    # `service_started`; add an orchestrator-level TCP/HTTP probe in prod.
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: SunReye-postgres
    environment:
      POSTGRES_DB: SunReye
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - SunReye_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  SunReye_postgres_data:
