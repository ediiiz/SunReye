name: sunreye-db

# Standalone TimescaleDB for local development (separate from the full-stack
# docker-compose.yml). Host networking is used so it also works with Docker
# inside an unprivileged Proxmox LXC, where bridged containers fail on the
# net.ipv4.ip_unprivileged_port_start sysctl. Reachable on localhost:5432,
# which matches apps/server/.env.

services:
  timescaledb:
    # Pinned to match the production compose files — see docker-compose.yml.
    image: timescale/timescaledb:2.28.2-pg17
    container_name: SunReye-timescaledb
    network_mode: host
    expose:
      - 5432
    # SSD-endurance tuning: cut the writes (TBW) a 1 Hz ingest makes.
    # synchronous_commit=off group-commits WAL (bounded <~0.5s crash-loss window
    # for telemetry — no corruption); wal_compression shrinks full-page images;
    # wider checkpoint spacing means fewer full-page writes. Additive `-c`
    # overrides — timescaledb's own config (shared_preload_libraries) is kept.
    command:
      - postgres
      - -c
      - synchronous_commit=off
      - -c
      - wal_compression=on
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_timeout=30min
    environment:
      POSTGRES_DB: SunReye
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - SunReye_timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: "no"

volumes:
  SunReye_timescale_data:
