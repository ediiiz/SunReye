name: sunreye

# Runs SunReye from the images published to GHCR by the CI pipelines — no local
# build. Copy .env.example to .env, fill in the secrets, then `docker compose up -d`.
#
# Pin a release by exporting SUNREYE_TAG (e.g. SUNREYE_TAG=v1.2.3) or leave it
# at "latest".

services:
  web:
    image: ghcr.io/ediiiz/sunreye-web:${SUNREYE_TAG:-latest}
    init: true
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      # Where the *browser* reaches the core engine (read at container start,
      # not baked into the image). Override when the API is not on
      # localhost:3000 from the browser's point of view.
      PUBLIC_SERVER_URL: ${PUBLIC_SERVER_URL:-http://localhost:3000}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/').then(r=>process.exit(r.ok?0:1),()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # One-shot schema migrator: runs the journaled migration runner (downgrade
  # guard, baseline stamping for pre-journal databases, pending drizzle
  # migrations, TimescaleDB pipeline), then exits. Safe on every `up` — it also
  # brings the schema forward on version upgrades. The server waits for this to
  # finish successfully before starting.
  migrate:
    image: ghcr.io/ediiiz/sunreye-migrate:${SUNREYE_TAG:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      # The migration runner only needs DATABASE_URL; skip the full server env
      # schema (auth secret, CORS, …) that isn't relevant here.
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/SunReye
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    image: ghcr.io/ediiiz/sunreye-server:${SUNREYE_TAG:-latest}
    init: true
    ports:
      - "${SERVER_PORT:-3000}:3000"
    # App configuration (auth secret, inverter host, MQTT, …) is read from .env.
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      # Always point at the bundled Postgres, regardless of what .env contains.
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/SunReye
    # The image is distroless (no shell/curl), so the server binary probes
    # itself: `--healthcheck` fetches /healthz (which round-trips the DB).
    healthcheck:
      test: ["CMD", "/app/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    # Pinned (not latest-pg17): the datadir under the volume is only compatible
    # with the pg major it was created by, and the timescaledb extension binary
    # must be >= the extension version stamped in the database. Bump this tag
    # deliberately with a release, never implicitly.
    image: timescale/timescaledb:2.28.2-pg17
    environment:
      POSTGRES_DB: SunReye
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - sunreye_pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sunreye_pg:
