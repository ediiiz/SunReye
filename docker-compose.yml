name: SunReye

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    ports:
      - "3001:3001"
    env_file:
      - path: apps/web/.env
        required: false
    environment:
      # Runtime (not build-time): where the *browser* reaches the core engine
      # in this split-origin topology.
      PUBLIC_SERVER_URL: http://localhost:3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/').then(r=>process.exit(r.ok?0:1),()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # One-shot schema migrator: runs the journaled migration runner (drizzle
  # migrations + TimescaleDB pipeline, see packages/db/src/migrate.ts) against
  # the Postgres service, then exits. Safe on every `up`; the server waits for
  # it to complete before starting.
  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    environment:
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/SunReye
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    init: true
    ports:
      - "3000:3000"
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/SunReye
    # The image is distroless (no shell/curl), so the server binary probes
    # itself: `--healthcheck` fetches /healthz (which round-trips the DB).
    healthcheck:
      test: ["CMD", "/app/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    # Pinned (not latest-pg17): the datadir under the volume is only compatible
    # with the pg major it was created by, and the timescaledb extension binary
    # must be >= the extension version stamped in the database. Bump this tag
    # deliberately with a release, never implicitly.
    image: timescale/timescaledb:2.28.2-pg17
    container_name: SunReye-postgres
    # SSD-endurance tuning: cut the writes (TBW) a 1 Hz ingest makes.
    # synchronous_commit=off group-commits WAL (bounded <~0.5s crash-loss window
    # for telemetry — no corruption); wal_compression shrinks full-page images;
    # wider checkpoint spacing means fewer full-page writes. Additive `-c`
    # overrides — timescaledb's own config (shared_preload_libraries) is kept.
    command:
      - postgres
      - -c
      - synchronous_commit=off
      - -c
      - wal_compression=on
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_timeout=30min
    environment:
      POSTGRES_DB: SunReye
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - SunReye_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  SunReye_postgres_data:
