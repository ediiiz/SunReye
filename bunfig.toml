[install]
linker = "isolated"

[test]
# Root test runs from the repo root, so the per-app bunfig preload does not
# apply. Load the web test-setup (Paraglide localStorage stub) here too.
preload = ["./scripts/test-env.ts", "./apps/web/src/test-setup.ts"]
coveragePathIgnorePatterns = [
  "**/dist/**",
  "**/node_modules/**",
  "**/*.test.ts",
  "**/test-setup.ts",
  "**/paraglide/**",
]
