name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx oxlint

      - name: Format check
        run: bunx oxfmt --check

      - name: Type check
        run: bun run check-types

      - name: Build
        run: bun run build
        env:
          PUBLIC_SERVER_URL: http://localhost:3000

  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test with coverage
        run: bun run test:coverage

      - name: Generate coverage badge
        run: bun run coverage:badge

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p badge-publish
          cp coverage/coverage.svg badge-publish/coverage.svg
          cd badge-publish
          git init -q
          git checkout -q -b badges
          git add coverage.svg
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -qm "chore: update coverage badge"
          git push -fq "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
