name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx oxlint

      - name: Format check
        run: bunx oxfmt --check

      - name: Type check
        run: bun run check-types

      # Every in-progress non-base locale must match en's keyset (missing/stale
      # keys fail). Empty locales (de/es/it/fr ship empty) are reported pending,
      # not failed — see apps/web/scripts/i18n-lint.ts.
      - name: i18n message lint
        working-directory: apps/web
        run: bun run i18n:lint

      # Production schema changes ship as committed, journaled migrations
      # (packages/db/src/migrations). Fail when the drizzle schema drifted from
      # the journal — i.e. someone changed src/schema without running
      # `bun run db:generate` — or when parallel branches collided in the journal.
      - name: Migration drift gate
        working-directory: packages/db
        run: |
          bunx drizzle-kit check
          bunx drizzle-kit generate
          if [ -n "$(git status --porcelain src/migrations)" ]; then
            echo "::error::Schema changed without a committed migration — run 'bun run db:generate' in packages/db and commit the result."
            git status --porcelain src/migrations
            exit 1
          fi

      - name: Build
        run: bun run build

  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test with coverage
        run: bun run test:coverage

      - name: Generate coverage badge
        run: bun run coverage:badge

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p badge-publish
          cp coverage/coverage.svg badge-publish/coverage.svg
          cd badge-publish
          git init -q
          git checkout -q -b badges
          git add coverage.svg
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -qm "chore: update coverage badge"
          git push -fq "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
