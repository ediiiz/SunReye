# Home Assistant addon manifest. The Supervisor pulls the prebuilt per-arch
# image from GHCR (built by .github/workflows/docker-addon.yml); it never
# builds locally. `version` is what the Supervisor offers as an update, so it
# must only ever name an image tag that already exists: release-please does NOT
# touch it — docker-addon.yml bumps it (and rewrites CHANGELOG.md) on master
# only after every arch image for the release tag has been pushed.
name: SunReye
version: 0.7.1
slug: sunreye
description: >-
  Self-hosted solar / hybrid inverter monitoring, control, and integration —
  Modbus polling, TimescaleDB history, live dashboard, REST API, and MQTT with
  HA discovery.
url: https://github.com/SunReye/SunReye
arch:
  - amd64
  - aarch64
image: ghcr.io/sunreye/sunreye-addon-{arch}
# s6-overlay v3 ships its own init.
init: false
startup: services
boot: auto
# First boot runs initdb + schema migrations before anything listens.
timeout: 120

# UI in the HA sidebar. ingress_stream keeps the /ws/metrics WebSocket and
# other streaming responses unbuffered.
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:solar-power-variant
panel_title: SunReye

# Optional direct LAN access (UI + API on one port), disabled by default —
# ingress is the primary door. Third-party integrations use
# http://<host>:8100/api/v1 with an API key.
ports:
  8100/tcp: null
ports_description:
  8100/tcp: Direct access to the dashboard and REST API (bypasses ingress)

# Auto-wire the Mosquitto broker addon when it's installed.
services:
  - mqtt:want

# /data (embedded postgres datadir + backups) is included in HA backups while
# the addon keeps running; backup_pre writes the logical dump that is the
# actual restore path (a live datadir copy is not restore-safe).
backup: hot
backup_pre: /usr/bin/sunreye-backup-pre

watchdog: http://[HOST]:[PORT:8099]/healthz

options:
  inverter_simulate: false
  poll_interval_ms: 1000
  log_level: info
  ha_discovery: true
  secure_cookies: false
  backups_keep: 3
  backup_full: false
schema:
  inverter_profile: str?
  inverter_host: str?
  inverter_port: port?
  inverter_unit_id: int(0,255)?
  inverter_transport: list(tcp|rtu-over-tcp)?
  inverter_simulate: bool
  poll_interval_ms: int(100,60000)
  log_level: list(trace|debug|info|warning|error|fatal)
  api_keys: str?
  external_database_url: str?
  mqtt_broker_url: str?
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic_prefix: str?
  ha_discovery: bool
  secure_cookies: bool
  backups_keep: int(0,10)
  backup_full: bool
